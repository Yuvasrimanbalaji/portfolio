<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Yellina Yuva Sriman Balaji</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial,Helvetica,sans-serif;
            background:#0b0f14;
            color:#ffffff;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .card{
            width:90%;
            max-width:600px;
            background:#111827;
            padding:50px;
            text-align:center;
            border-radius:18px;
            border:1px solid #14b8a6;
            box-shadow:0 0 25px rgba(20,184,166,.25);
        }

        .icon{
            font-size:80px;
            margin-bottom:20px;
        }

        h1{
            color:#14b8a6;
            margin-bottom:20px;
            font-size:36px;
        }

        p{
            font-size:18px;
            line-height:1.8;
            color:#d1d5db;
            margin-bottom:35px;
        }

        a{
            display:inline-block;
            padding:14px 32px;
            background:#14b8a6;
            color:#0b0f14;
            text-decoration:none;
            border-radius:10px;
            font-size:18px;
            font-weight:bold;
            transition:.3s;
        }

        a:hover{
            background:#0d9488;
            transform:translateY(-3px);
        }

        footer{
            margin-top:35px;
            color:#94a3b8;
            font-size:14px;
        }
    </style>
</head>

<body>

<div class="card">

    <div class="icon">✅</div>

    <h1>Message Sent Successfully!</h1>

    <p>
        Thank you for contacting me.<br>
        I have received your message and will respond as soon as possible.
    </p>

    <a href="index.html">← Back to Portfolio</a>

    <footer>
        © 2026 Yellina Yuva Sriman Balaji
    </footer>

</div>

</body>
</html>
